name: Cargo audit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cargo-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Install cargo-audit
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-audit
      - name: Run cargo audit
        run: |
          # Remaining advisories are transitive through rama 0.3.0-alpha.4 and
          # the pinned ratatui fork; keep Dependabot alerts visible until their
          # upstream constraints can move.
          cargo audit --deny warnings \
            --ignore GHSA-3v94-mw7p-v465 \
            --ignore GHSA-q2qq-hmj6-3wpp \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0097
